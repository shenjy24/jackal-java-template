services:
  app-server:
    image: ${APP_IMAGE:-java-template:prod}
    container_name: ${APP_CONTAINER_NAME:-java-template-prod}
    pull_policy: never
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APP_LOG_DIR:-../logs}:/app/logs
    ports:
      - "${APP_PORT:-18080}:8080"
    deploy:
      resources:
        limits:
          memory: ${APP_MEMORY_LIMIT:-1G}
        reservations:
          memory: ${APP_MEMORY_RESERVATION:-512M}
