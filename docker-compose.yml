services:
  java-template:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
