services:
  app-server:
    image: ${APP_IMAGE:-java-template:dev}
    container_name: ${APP_CONTAINER_NAME:-java-template-dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    pull_policy: never
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APP_LOG_DIR:-./logs}:/app/logs
    ports:
      - "${APP_PORT:-8080}:8080"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
